<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Grid pattern -->
    <pattern id="hex-grid" width="60" height="103.923" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 17.32 L60 51.96 L30 69.28 L0 51.96 L0 17.32 Z" fill="none" stroke="rgba(125,184,255,0.04)" stroke-width="0.5"/>
      <path d="M60 51.96 L90 69.28 L90 103.92 L60 121.24 L30 103.92 L30 69.28 Z" fill="none" stroke="rgba(125,184,255,0.04)" stroke-width="0.5"/>
    </pattern>

    <!-- Dot grid -->
    <pattern id="dot-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(125,184,255,0.06)"/>
    </pattern>

    <!-- Noise texture -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
    </filter>

    <!-- Glow -->
    <filter id="bg-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <filter id="bg-glow-small" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <!-- Circuit trace gradient -->
    <linearGradient id="circuit-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="40%" stop-color="rgba(125,184,255,0.15)"/>
      <stop offset="60%" stop-color="rgba(125,184,255,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background base -->
  <rect width="1920" height="1080" fill="#080810"/>

  <!-- Hex grid overlay -->
  <rect width="1920" height="1080" fill="url(#hex-grid)"/>

  <!-- Dot grid -->
  <rect width="1920" height="1080" fill="url(#dot-grid)"/>

  <!-- Noise texture -->
  <rect width="1920" height="1080" filter="url(#noise)" opacity="0.5"/>

  <!-- Ambient glow - top-left cyan -->
  <ellipse cx="400" cy="200" rx="500" ry="400" fill="rgba(56,232,200,0.03)" filter="url(#bg-glow)"/>
  <ellipse cx="400" cy="200" rx="300" ry="200" fill="rgba(125,184,255,0.04)" filter="url(#bg-glow)"/>

  <!-- Ambient glow - center blue -->
  <ellipse cx="960" cy="540" rx="600" ry="400" fill="rgba(125,184,255,0.03)" filter="url(#bg-glow)"/>

  <!-- Ambient glow - bottom-right purple -->
  <ellipse cx="1500" cy="800" rx="500" ry="350" fill="rgba(167,139,250,0.03)" filter="url(#bg-glow)"/>
  <ellipse cx="1500" cy="800" rx="300" ry="200" fill="rgba(180,156,250,0.03)" filter="url(#bg-glow)"/>

  <!-- Circuit traces - decorative -->
  <g opacity="0.08">
    <!-- Left side traces -->
    <path d="M0 300 L100 300 L140 260 L200 260" fill="none" stroke="#7db8ff" stroke-width="1"/>
    <path d="M0 700 L120 700 L160 660 L200 660" fill="none" stroke="#a78bfa" stroke-width="1"/>
    <path d="M0 500 L80 500 L120 460 L160 460" fill="none" stroke="#38e8c8" stroke-width="1"/>

    <!-- Right side traces -->
    <path d="M1920 200 L1800 200 L1760 240 L1700 240" fill="none" stroke="#7db8ff" stroke-width="1"/>
    <path d="M1920 800 L1760 800 L1720 760 L1660 760" fill="none" stroke="#a78bfa" stroke-width="1"/>
    <path d="M1920 500 L1840 500 L1800 540 L1760 540" fill="none" stroke="#f880a0" stroke-width="1"/>

    <!-- Top traces -->
    <path d="M600 0 L600 60 L640 100" fill="none" stroke="#7db8ff" stroke-width="1"/>
    <path d="M1200 0 L1200 80 L1160 120" fill="none" stroke="#a78bfa" stroke-width="1"/>

    <!-- Cross connections -->
    <path d="M800 1080 L800 1000 L840 960" fill="none" stroke="#38e8c8" stroke-width="1"/>
    <path d="M1300 1080 L1300 1020 L1260 980" fill="none" stroke="#7db8ff" stroke-width="1"/>
  </g>

  <!-- Small floating data nodes -->
  <g opacity="0.12">
    <circle cx="200" cy="260" r="3" fill="#7db8ff" filter="url(#bg-glow-small)"/>
    <circle cx="1700" cy="240" r="3" fill="#7db8ff" filter="url(#bg-glow-small)"/>
    <circle cx="640" cy="100" r="2.5" fill="#a78bfa" filter="url(#bg-glow-small)"/>
    <circle cx="1160" cy="120" r="2.5" fill="#a78bfa" filter="url(#bg-glow-small)"/>
  </g>

  <!-- Very subtle horizontal grid lines -->
  <g opacity="0.03" stroke="#7db8ff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1920" y2="100"/>
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="300" x2="1920" y2="300"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="500" x2="1920" y2="500"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="700" x2="1920" y2="700"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="0" y1="1000" x2="1920" y2="1000"/>
  </g>
</svg>
