<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
     viewBox="0 0 1920 1080" style="enable-background:new 0 0 1920 1080;" xml:space="preserve">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1030;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#15102a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="25%" cy="15%" r="60%">
      <stop offset="0%" style="stop-color:#2a1a50;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:0" />
