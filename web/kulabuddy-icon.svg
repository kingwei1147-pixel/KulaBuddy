<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Neon glow filter -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="30" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner glow -->
    <filter id="inner-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="rgba(0,0,0,0.15)"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.5" fill="rgba(125,184,255,0.08)"/>
    </pattern>

    <!-- Gradient backgrounds -->
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="50%" stop-color="#0c0c1e"/>
      <stop offset="100%" stop-color="#0a0a16"/>
    </linearGradient>

    <linearGradient id="k-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7db8ff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7db8ff"/>
    </linearGradient>

    <linearGradient id="circuit-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="40%" stop-color="rgba(125,184,255,0.3)"/>
      <stop offset="60%" stop-color="rgba(125,184,255,0.3)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Animated gradient -->
    <linearGradient id="border-race" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7db8ff">
        <animate attributeName="stop-color" values="#7db8ff;#a78bfa;#38e8c8;#f880a0;#7db8ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#38e8c8;#f880a0;#7db8ff;#a78bfa" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#hex-grad)" rx="96"/>
  <rect width="512" height="512" fill="url(#grid)" rx="96"/>
  <rect width="512" height="512" fill="url(#scanlines)" rx="96"/>

  <!-- Circuit traces - left -->
  <g opacity="0.4">
    <path d="M60 200 L100 200 L120 220 L120 280" fill="none" stroke="#7db8ff" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="60" cy="200" r="3" fill="#7db8ff"/>
    <circle cx="120" cy="280" r="3" fill="#7db8ff"/>

    <path d="M80 360 L110 360 L130 340 L130 300" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,4"/>
    <circle cx="80" cy="360" r="2.5" fill="#a78bfa"/>
  </g>

  <!-- Circuit traces - right -->
  <g opacity="0.4">
    <path d="M452 180 L420 180 L400 200 L400 260 L380 280" fill="none" stroke="#38e8c8" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="452" cy="180" r="3" fill="#38e8c8"/>
    <circle cx="380" cy="280" r="3" fill="#38e8c8"/>

    <path d="M440 340 L410 340 L390 320 L390 290" fill="none" stroke="#7db8ff" stroke-width="1.5" stroke-dasharray="3,4"/>
    <circle cx="440" cy="340" r="2.5" fill="#7db8ff"/>
  </g>

  <!-- Circuit traces - top -->
  <g opacity="0.3">
    <path d="M200 60 L200 90 L220 110 L280 110" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,3"/>
    <path d="M300 60 L300 90 L280 110" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,3"/>
  </g>

  <!-- Main hexagon layer - outer -->
  <g filter="url(#neon-glow)">
    <polygon points="256,76 376,138 376,374 256,436 136,374 136,138"
             fill="none" stroke="url(#border-race)" stroke-width="3"/>
  </g>

  <!-- Hexagon - mid layer -->
  <polygon points="256,96 358,150 358,362 256,416 154,362 154,150"
           fill="rgba(12,12,30,0.85)" stroke="rgba(125,184,255,0.12)" stroke-width="1"/>

  <!-- Hexagon - inner glow -->
  <polygon points="256,96 358,150 358,362 256,416 154,362 154,150"
           fill="url(#inner-glow)" opacity="0.08"/>

  <!-- Inner hexagon ring -->
  <polygon points="256,110 340,156 340,356 256,402 172,356 172,156"
           fill="none" stroke="rgba(125,184,255,0.06)" stroke-width="1"/>

  <!-- Stylized "K" letter -->
  <g filter="url(#neon-glow)">
    <!-- K main vertical -->
    <line x1="205" y1="175" x2="205" y2="337" stroke="url(#k-grad)" stroke-width="9" stroke-linecap="round"/>

    <!-- K upper diagonal -->
    <line x1="215" y1="256" x2="290" y2="185" stroke="url(#k-grad)" stroke-width="8" stroke-linecap="round"/>

    <!-- K lower diagonal -->
    <line x1="215" y1="265" x2="295" y2="330" stroke="url(#k-grad)" stroke-width="8" stroke-linecap="round"/>

    <!-- K accent - upper -->
    <line x1="290" y1="185" x2="300" y2="175" stroke="#38e8c8" stroke-width="3" stroke-linecap="round"/>
    <!-- K accent - lower -->
    <line x1="295" y1="330" x2="305" y2="340" stroke="#f880a0" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- K sparkle dots -->
  <g opacity="0.8">
    <circle cx="205" cy="175" r="2.5" fill="#7db8ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="175" r="2" fill="#38e8c8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="305" cy="340" r="2" fill="#f880a0">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Terminal cursor accent -->
  <g transform="translate(195, 370)" opacity="0.5">
    <rect width="8" height="14" rx="1" fill="#38e8c8">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Floating code brackets -->
  <text x="140" y="118" fill="rgba(125,184,255,0.15)" font-family="monospace" font-size="14">&#123;</text>
  <text x="362" y="400" fill="rgba(125,184,255,0.15)" font-family="monospace" font-size="14">&#125;</text>

  <!-- Bottom glow accent -->
  <ellipse cx="256" cy="440" rx="120" ry="8" fill="rgba(125,184,255,0.08)" filter="url(#neon-glow)"/>

  <!-- Data dots on hex edge -->
  <g opacity="0.3">
    <circle cx="136" cy="138" r="2" fill="#a78bfa"/>
    <circle cx="376" cy="138" r="2" fill="#7db8ff"/>
    <circle cx="136" cy="374" r="2" fill="#38e8c8"/>
    <circle cx="376" cy="374" r="2" fill="#f880a0"/>
  </g>
</svg>
