appId: com.momo.agent
productName: DaDa
copyright: Copyright 2026 Orion Wang

directories:
  output: dist-electron
  buildResources: electron/resources

files:
  - dist/**/*
  - web/**/*
  - electron/**/*
  - package.json
  - node_modules/**/*

extraResources:
  - from: models
    to: models
    filter:
      - "*.gguf"
      - "*.bin"
      - "*.mmproj"

asar: true
asarUnpack:
  - "node_modules/node-llama-cpp/**"
  - "node_modules/sql.js/**"
  - "node_modules/playwright/**"

win:
  target:
    - nsis
  icon: web/momo-icon.jpg
  artifactName: ${productName}-${version}-${arch}.${ext}
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: DaDa
  installerIcon: web/momo-icon.jpg
  uninstallerIcon: web/momo-icon.jpg

mac:
  target:
    - dmg
  icon: web/momo-icon.jpg
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}

dmg:
  title: DaDa ${version}
  iconSize: 100
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - AppImage
  icon: web/momo-icon.jpg
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}
